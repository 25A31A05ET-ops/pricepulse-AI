<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PricePluse AI - Smart Grocery Price Comparison</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <span class="logo-text">PricePluse AI</span>
            </div>
            <div class="header-actions">
                <button class="gravity-toggle" id="gravityToggle">
                    <span class="toggle-icon"><i class="fas fa-gravity-high"></i></span>
                    <span class="toggle-text">Gravity Mode</span>
                </button>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search groceries... (Try: cheapest, under ₹100, best quality)">
                    <button class="voice-btn" id="voiceBtn" title="Voice Search">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="clear-btn" id="clearBtn" title="Clear">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </section>

        <!-- AI Suggestion -->
        <section class="ai-suggestion" id="aiSuggestion">
            <div class="ai-badge">
                <i class="fas fa-robot"></i>
                <span>AI Suggestion</span>
            </div>
            <p class="ai-text" id="aiText"></p>
        </section>

        <!-- Platform Tabs -->
        <section class="platform-tabs">
            <button class="platform-tab active" data-platform="all">
                <i class="fas fa-th"></i>
                All Stores
            </button>
            <button class="platform-tab" data-platform="amazon">
                <i class="fab fa-amazon"></i>
                Amazon
            </button>
            <button class="platform-tab" data-platform="flipkart">
                <i class="fas fa-shopping-bag"></i>
                Flipkart
            </button>
            <button class="platform-tab" data-platform="blinkit">
                <i class="fas fa-bolt"></i>
                Blinkit
            </button>
        </section>

        <!-- Products Grid -->
        <section class="products-section">
            <div class="section-header">
                <h2>Available Products</h2>
                <div class="filter-tags" id="filterTags"></div>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
            <div class="loading" id="loading">
                <div class="loader"></div>
                <p>Finding best prices for you...</p>
            </div>
        </section>

        <!-- Gravity Mode Canvas -->
        <div class="gravity-canvas" id="gravityCanvas">
            <div class="gravity-header">
                <button class="close-gravity" id="closeGravity">
                    <i class="fas fa-times"></i>
                </button>
                <h3>🎉 Gravity Mode</h3>
            </div>
            <div id="physics-container"></div>
        </div>

        <!-- Chatbot -->
        <div class="chatbot-toggle" id="chatbotToggle">
            <i class="fas fa-comments"></i>
        </div>
        <div class="chatbot-container" id="chatbotContainer">
            <div class="chatbot-header">
                <div class="chatbot-title">
                    <i class="fas fa-robot"></i>
                    <span>Shopping Assistant</span>
                </div>
                <button class="chatbot-close" id="chatbotClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="chatbot-messages" id="chatbotMessages">
                <div class="message bot-message">
                    <div class="message-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hello! I'm your shopping assistant. Ask me anything like:</p>
                        <ul>
                            <li>"Which is the cheapest rice?"</li>
                            <li>"What should I buy for cooking?"</li>
                            <li>"Best quality products under ₹500?"</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="chatbot-input">
                <input type="text" id="chatInput" placeholder="Type your question...">
                <button id="sendChat">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
